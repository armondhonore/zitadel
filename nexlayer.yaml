application:
  version: 2.0
  name: zitadel
  pods:
  - name: app
    image: ghcr.io/zitadel/zitadel:latest
    path: /
    servicePorts:
    - 8080
    command: "start-from-init --masterkeyFromEnv"
    vars:
      ZITADEL_DATABASE_POSTGRES_HOST: "postgres.pod"
      ZITADEL_DATABASE_POSTGRES_PORT: "5432"
      ZITADEL_DATABASE_POSTGRES_DATABASE: "zitadel"
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: "zitadel"
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: "zitadel"
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: "postgres"
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: "rootpass"
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALDOMAIN: "relaxed-weasel-zitadel.cloud.nexlayer.ai"
      ZITADEL_EXTERNALPORT: "443"
      ZITADEL_EXTERNALSECURE: "true"
      ZITADEL_MASTERKEY: "MasterkeyNeedsTo32Characters!!!"
      ZITADEL_TLS_ENABLED: "false"
  - name: postgres
    image: mirror.gcr.io/library/postgres:16-alpine
    servicePorts:
    - 5432
    resourceType: statefulset
    vars:
      POSTGRES_DB: zitadel
      POSTGRES_USER: zitadel
      POSTGRES_PASSWORD: zitadel
      POSTGRES_INITDB_ARGS: "--lc-collate=C --lc-ctype=C"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
    - name: zitadel-db
      mountPath: /var/lib/postgresql/data
      size: 5Gi
